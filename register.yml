info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/api/auth/register"
  body:
    type: json
    data: |-
      {
        "username": "user1",
        "email": "user1@mail.ru",
        "password": "password"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
